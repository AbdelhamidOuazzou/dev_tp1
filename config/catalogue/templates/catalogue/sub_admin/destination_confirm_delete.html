{% extends 'catalogue/admin/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h2 class="mb-0">Confirmer la suppression</h2>
        </div>
        <div class="card-body">
            <p class="lead">Êtes-vous sûr de vouloir supprimer la destination "{{ destination.nom }}" ?</p>
            <p class="text-danger">Cette action est irréversible.</p>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash"></i> Confirmer la suppression
                    </button>
                    <a href="{% url 'sub_admin_destination_list' %}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
